name: korthai_words
description: A local-first Korean vocabulary practice app for Thai learners.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.2.5
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/categories.json
    - assets/data/words_beginner.json
    - assets/data/words_intermediate.json
    - assets/data/words_advanced.json
